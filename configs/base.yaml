# LSTM + Meta Optimizer + Few-shot NIDS main configuration.
experiment:
  name: "lstm_metaopt_fewshot_ids"
  seed: 42
  deterministic: true

device:
  prefer: "auto"
  amp: false

data:
  name: "cicids2017"
  root: "datasets/CICIDS2017"
  cache_dir: "outputs/cache"
  use_cache: true

  known_classes: ["dos", "ddos", "botnet", "portscan"]
  unknown_class: "webattack"
  include_benign: true
  label_mapping: {}

  windowing_mode: "temporal"
  window_label_strategy: "last"
  majority_tie_break: "last"
  window_size: 16
  stride: 8
  standardize: true
  max_per_class: 20000
  train_fraction: 1.0

  split_mode: "temporal"
  split_granularity: "per_class_temporal"
  eval_ratio: 0.2
  test_ratio: 0.2
  strict_adapt_test: true
  adapt_val_ratio: 0.5
  disallow_support_query_overlap: true
  disallow_internal_overlap: true

  n_way: 2
  k_shot: 5
  q_query: 10
  tasks_per_epoch: 100
  meta_batch_size: 4
  task_mode: "binary"
  binary_pair_mode: "benign_vs_attack"

model:
  arch: "lstm"
  lstm:
    hidden_size: 32
    num_layers: 1
    dropout: 0.0

meta_optimizer:
  hidden_size: 20
  num_layers: 2
  preprocess: true
  preprocess_p: 10.0
  output_scale: 0.05
  update_norm_clip: 1.0
  use_learnable_lr: true

meta:
  inner_steps: 5
  tbptt_steps: 0
  first_order: false
  meta_optimizer_lr: 0.001
  update_norm_clip: 1.0
  adapt_scope: "head_only"

train:
  meta_epochs: 30
  grad_clip: 1.0
  log_interval: 20
  eval_interval: 1
  eval_tasks: 50
  fixed_validation_tasks: true
  validation_task_audit_path: null
  early_stopping:
    enabled: true
    patience: 10
    metric: "f1"
    mode: "max"
  checkpoint:
    dir: "checkpoints"
    save_best: true
    save_last: true
    monitor: "f1"
  tensorboard:
    enabled: true
    dir: "logs/tensorboard"

adaptation_speed:
  target_f1: 0.80
  target_f1_grid: [0.75, 0.80, 0.85, 0.90]
  max_steps: 20
  checkpoints: [0, 1, 2, 5, 10, 20]
  eval_every: 1

compare:
  shots: [1, 3, 5, 10]
  seeds: [42, 52, 62, 72, 82]
  val_tasks: 30
  test_tasks: 100
  baseline_lr_grid:
    sgd: [0.5, 0.1, 0.05, 0.01]
    adam: [0.01, 0.005, 0.001, 0.0005]

output:
  dir: "outputs"
  figures_dir: "outputs/figures"

fast_adaptation_matrix:
  unknowns: "botnet,bruteforce,ddos,dos"
  shots: [1, 3, 5, 10]
  seeds: [42, 52, 62, 72, 82]
  train_horizons: [5, 10, 20]
  train_fractions: [1.0]
  eval_steps: 20
